name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          git -C /home/debian/curse/curse-web fetch origin master
          git -C /home/debian/curse/curse-web reset --hard origin/master

      - name: Rebuild and restart container
        run: docker compose -f /home/debian/curse/curse-web/docker-compose.yml up -d --build
